<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Dual Temp</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0a;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .widget {
    width: 100%;
    max-width: 370px;
    aspect-ratio: 3.4 / 1.55;
    border-radius: 22px;
    padding: 14px 18px 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease;
    opacity: 0;
    animation: fadeIn 0.4s ease forwards 0.1s;

    /* iOS-style sky gradient */
    background: linear-gradient(170deg, #4a9be8 0%, #3a7bd5 30%, #5b8fcf 60%, #7bacd8 100%);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .widget:active { transform: scale(0.98); }

  /* Subtle cloud/light overlay */
  .widget::before {
    content: '';
    position: absolute;
    top: -30%; right: -10%;
    width: 70%; height: 80%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  /* --- Top Section --- */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }

  .top-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .location {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .location-arrow {
    font-size: 10px;
    opacity: 0.8;
  }

  .top-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .date-line {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.2px;
  }

  /* --- Temperature Section --- */
  .temp-section {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: relative;
    z-index: 1;
    margin-top: -2px;
  }

  .temp-left {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .temp-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    padding-bottom: 6px;
  }

  .condition {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
  }

  .hi-lo {
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
  }

  .temp-f-main {
    font-size: 48px;
    font-weight: 300;
    color: #fff;
    line-height: 1;
    letter-spacing: -2px;
  }

  .temp-f-main .degree {
    font-size: 22px;
    font-weight: 300;
    vertical-align: super;
    margin-left: -2px;
  }

  .temp-c-sub {
    font-size: 22px;
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    line-height: 1;
    letter-spacing: -0.5px;
    margin-left: 2px;
    padding-bottom: 4px;
  }

  .temp-c-sub .degree {
    font-size: 12px;
    vertical-align: super;
    margin-left: -1px;
  }

  /* --- Forecast Strip --- */
  .forecast-strip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 10px;
    position: relative;
    z-index: 1;
    gap: 2px;
  }

  .forecast-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }

  .forecast-time {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.2px;
  }

  .forecast-icon {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .forecast-icon svg {
    width: 100%;
    height: 100%;
  }

  .forecast-temp {
    font-size: 12px;
    font-weight: 500;
    color: #fff;
  }

  /* Now label */
  .forecast-item.now .forecast-time {
    color: #fff;
    font-weight: 700;
  }

  /* --- Loading --- */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
  }

  .loading-spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .loading-text {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
  }

  .refreshing .temp-f-main,
  .refreshing .temp-c-sub {
    animation: pulse 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="widget" id="widget">
  <div class="loading-state">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading weather...</div>
  </div>
</div>

<script>
  // --- Weather codes ---
  const conditionNames = {
    0: 'Clear', 1: 'Mostly Clear', 2: 'Partly Cloudy', 3: 'Overcast',
    45: 'Foggy', 48: 'Rime Fog',
    51: 'Light Drizzle', 53: 'Drizzle', 55: 'Heavy Drizzle',
    56: 'Freezing Drizzle', 57: 'Freezing Drizzle',
    61: 'Light Rain', 63: 'Rain', 65: 'Heavy Rain',
    66: 'Freezing Rain', 67: 'Freezing Rain',
    71: 'Light Snow', 73: 'Snow', 75: 'Heavy Snow', 77: 'Snow Grains',
    80: 'Light Showers', 81: 'Showers', 82: 'Heavy Showers',
    85: 'Snow Showers', 86: 'Snow Showers',
    95: 'Thunderstorm', 96: 'Thunderstorm', 99: 'Severe Storm'
  };

  // --- SVG weather icons ---
  function weatherIcon(code, isNight) {
    // Sun
    const sun = `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.5" fill="#FFD93D"/><g stroke="#FFD93D" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="4.5"/><line x1="12" y1="19.5" x2="12" y2="22"/><line x1="2" y1="12" x2="4.5" y2="12"/><line x1="19.5" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="6.7" y2="6.7"/><line x1="17.3" y1="17.3" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="6.7" y2="17.3"/><line x1="17.3" y1="6.7" x2="19.07" y2="4.93"/></g></svg>`;
    // Moon
    const moon = `<svg viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="#FFD93D" opacity="0.9"/></svg>`;
    // Cloud
    const cloud = `<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 18.5h10a4.5 4.5 0 0 0 .68-8.95A6 6 0 0 0 5.5 13.5a4 4 0 0 0 1 5z" fill="white" opacity="0.9"/></svg>`;
    // Sun+Cloud
    const sunCloud = `<svg viewBox="0 0 24 24" fill="none"><circle cx="10" cy="8" r="3" fill="#FFD93D"/><g stroke="#FFD93D" stroke-width="1" stroke-linecap="round"><line x1="10" y1="2.5" x2="10" y2="3.8"/><line x1="10" y1="12.2" x2="10" y2="13"/><line x1="4.5" y1="8" x2="5.8" y2="8"/><line x1="14.2" y1="8" x2="15.5" y2="8"/><line x1="6.1" y1="4.1" x2="7" y2="5"/><line x1="13" y1="11" x2="13.9" y2="11.9"/><line x1="6.1" y1="11.9" x2="7" y2="11"/></g><path d="M7 19h10a4 4 0 0 0 .5-7.97A5.5 5.5 0 0 0 6 14a3.5 3.5 0 0 0 1 5z" fill="white" opacity="0.85"/></svg>`;
    // Rain
    const rain = `<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 15h10a4.5 4.5 0 0 0 .68-8.95A6 6 0 0 0 5.5 10a4 4 0 0 0 1 5z" fill="white" opacity="0.8"/><g stroke="#7CB3F2" stroke-width="1.5" stroke-linecap="round"><line x1="9" y1="17" x2="8" y2="20"/><line x1="13" y1="17" x2="12" y2="20"/></g></svg>`;
    // Heavy Rain
    const heavyRain = `<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 14h10a4.5 4.5 0 0 0 .68-8.95A6 6 0 0 0 5.5 9a4 4 0 0 0 1 5z" fill="white" opacity="0.8"/><g stroke="#7CB3F2" stroke-width="1.5" stroke-linecap="round"><line x1="8" y1="16" x2="7" y2="19"/><line x1="11.5" y1="16" x2="10.5" y2="19"/><line x1="15" y1="16" x2="14" y2="19"/></g></svg>`;
    // Snow
    const snow = `<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 15h10a4.5 4.5 0 0 0 .68-8.95A6 6 0 0 0 5.5 10a4 4 0 0 0 1 5z" fill="white" opacity="0.8"/><circle cx="9" cy="18" r="1" fill="white"/><circle cx="13" cy="19" r="1" fill="white"/><circle cx="11" cy="17" r="0.8" fill="white"/></svg>`;
    // Thunder
    const thunder = `<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 13h10a4.5 4.5 0 0 0 .68-8.95A6 6 0 0 0 5.5 8a4 4 0 0 0 1 5z" fill="white" opacity="0.75"/><path d="M13 14l-2 4h3l-2 4" stroke="#FFD93D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    // Fog
    const fog = `<svg viewBox="0 0 24 24" fill="none"><g stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"><line x1="4" y1="8" x2="20" y2="8"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="16" x2="20" y2="16"/><line x1="8" y1="20" x2="16" y2="20"/></g></svg>`;

    if (code === 0) return isNight ? moon : sun;
    if (code === 1) return isNight ? moon : sun;
    if (code === 2) return sunCloud;
    if (code === 3) return cloud;
    if (code >= 45 && code <= 48) return fog;
    if (code >= 51 && code <= 57) return rain;
    if (code >= 61 && code <= 67) return code >= 65 ? heavyRain : rain;
    if (code >= 71 && code <= 77) return snow;
    if (code >= 80 && code <= 82) return code >= 82 ? heavyRain : rain;
    if (code >= 85 && code <= 86) return snow;
    if (code >= 95) return thunder;
    return cloud;
  }

  // --- Helpers ---
  const cToF = c => Math.round((c * 9 / 5) + 32);
  const FALLBACK = { lat: 37.4563, lon: 126.7052, name: 'Incheon' };

  function formatDay(date) {
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${days[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()}`;
  }

  function formatHour(isoStr) {
    const d = new Date(isoStr);
    const h = d.getHours();
    if (h === 0) return '12AM';
    if (h === 12) return '12PM';
    return h > 12 ? (h - 12) + 'PM' : h + 'AM';
  }

  // --- Fetch ---
  async function getWeather(lat, lon, locationName) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,is_day&daily=temperature_2m_max,temperature_2m_min&hourly=temperature_2m,weather_code,is_day&timezone=auto&forecast_days=2`;
    const res = await fetch(url);
    const d = await res.json();
    const name = locationName || (d.timezone ? d.timezone.split('/').pop().replace(/_/g, ' ') : 'Location');

    // Find current hour index
    // Build local time string to match API's local times (e.g. "2026-03-19T09")
    const now = new Date();
    const localISO = now.getFullYear() + '-' +
      String(now.getMonth() + 1).padStart(2, '0') + '-' +
      String(now.getDate()).padStart(2, '0') + 'T' +
      String(now.getHours()).padStart(2, '0');
    let startIdx = d.hourly.time.findIndex(t => t.startsWith(localISO));
    if (startIdx === -1) startIdx = 0;

    // Get next 6 hours of forecast
    const forecast = [];
    for (let i = 0; i < 6 && (startIdx + i) < d.hourly.time.length; i++) {
      const idx = startIdx + i;
      forecast.push({
        time: i === 0 ? 'Now' : formatHour(d.hourly.time[idx]),
        tempF: cToF(d.hourly.temperature_2m[idx]),
        code: d.hourly.weather_code[idx],
        isNight: !d.hourly.is_day[idx]
      });
    }

    return {
      tempC: Math.round(d.current.temperature_2m),
      tempF: cToF(d.current.temperature_2m),
      code: d.current.weather_code,
      isDay: d.current.is_day,
      condition: conditionNames[d.current.weather_code] || 'Unknown',
      hiF: cToF(d.daily.temperature_2m_max[0]),
      loF: cToF(d.daily.temperature_2m_min[0]),
      hiC: Math.round(d.daily.temperature_2m_max[0]),
      loC: Math.round(d.daily.temperature_2m_min[0]),
      location: name,
      forecast,
      time: new Date()
    };
  }

  async function fetchWeather() {
    try {
      let lat, lon, locName;
      try {
        const pos = await new Promise((res, rej) => {
          if (!navigator.geolocation) { rej(); return; }
          navigator.geolocation.getCurrentPosition(res, rej, {
            enableHighAccuracy: false, timeout: 8000, maximumAge: 60000
          });
        });
        lat = pos.coords.latitude;
        lon = pos.coords.longitude;
      } catch (e) {
        lat = FALLBACK.lat; lon = FALLBACK.lon; locName = FALLBACK.name;
      }
      return await getWeather(lat, lon, locName);
    } catch (err) {
      // Demo fallback
      const demoForecast = [
        { time: 'Now', tempF: 54, code: 2, isNight: false },
        { time: '2PM', tempF: 56, code: 2, isNight: false },
        { time: '3PM', tempF: 57, code: 3, isNight: false },
        { time: '4PM', tempF: 55, code: 3, isNight: false },
        { time: '5PM', tempF: 52, code: 1, isNight: false },
        { time: '6PM', tempF: 49, code: 0, isNight: true },
      ];
      return {
        tempC: 12, tempF: 54, code: 2, isDay: 1,
        condition: 'Partly Cloudy',
        hiF: 57, loF: 41, hiC: 14, loC: 5,
        location: 'Incheon', forecast: demoForecast,
        time: new Date()
      };
    }
  }

  // --- Render ---
  function render(d) {
    const w = document.getElementById('widget');
    const dateStr = formatDay(d.time);

    const forecastHTML = d.forecast.map((f, i) => `
      <div class="forecast-item${i === 0 ? ' now' : ''}">
        <span class="forecast-time">${f.time}</span>
        <div class="forecast-icon">${weatherIcon(f.code, f.isNight)}</div>
        <span class="forecast-temp">${f.tempF}°</span>
      </div>
    `).join('');

    w.innerHTML = `
      <div class="top">
        <div class="top-left">
          <div class="location">${d.location}<span class="location-arrow"> ↗</span></div>
        </div>
        <div class="top-right">
          <div class="date-line">${dateStr}</div>
        </div>
      </div>
      <div class="temp-section">
        <div class="temp-left">
          <div class="temp-f-main">${d.tempF}<span class="degree">°</span></div>
          <div class="temp-c-sub">${d.tempC}<span class="degree">°</span>C</div>
        </div>
        <div class="temp-right">
          <div class="condition">${d.condition}</div>
          <div class="hi-lo">H:${d.hiF}° L:${d.loF}°</div>
        </div>
      </div>
      <div class="forecast-strip">${forecastHTML}</div>
    `;
  }

  async function refresh() {
    const w = document.getElementById('widget');
    w.classList.add('refreshing');
    render(await fetchWeather());
    setTimeout(() => w.classList.remove('refreshing'), 500);
  }

  document.getElementById('widget').addEventListener('click', refresh);
  setInterval(refresh, 10 * 60 * 1000);
  refresh();
</script>

</body>
</html>
